name: Deploy Server to VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-vps.yml"
      - "src/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "prisma.config.ts"
      - "Dockerfile"
      - "docker-compose.prod.yml"
      - ".dockerignore"
      - "deploy/**"

permissions:
  contents: read

concurrency:
  group: vps-server-production
  cancel-in-progress: true

env:
  REMOTE_PATH: /opt/pm-server

jobs:
  validate:
    name: Validate server build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/meco_platform?schema=public

  deploy:
    name: Deploy to VPS
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote directory exists
        shell: bash
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p ${REMOTE_PATH}"

      - name: Sync repository to VPS
        shell: bash
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '.env.production' \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${REMOTE_PATH}/"

      - name: Upload production env file
        shell: bash
        env:
          PRODUCTION_ENV_FILE: ${{ secrets.PRODUCTION_ENV_FILE }}
        run: |
          printf '%s' "$PRODUCTION_ENV_FILE" > .env.production
          scp .env.production "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${REMOTE_PATH}/.env.production"

      - name: Deploy containers on VPS
        shell: bash
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'EOF'
          set -euo pipefail
          cd /opt/pm-server
          docker --version
          docker compose version
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build --remove-orphans
          docker image prune -f
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8080/health > /dev/null; then
              echo "Health check passed."
              exit 0
            fi
            echo "Waiting for app health check (${attempt}/30)..."
            sleep 5
          done
          echo "Application never became healthy."
          docker compose --env-file .env.production -f docker-compose.prod.yml ps
          exit 1
          EOF
