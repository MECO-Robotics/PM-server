name: CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "package.json"
      - "package-lock.json"
      - "prisma/**"
      - "prisma.config.ts"
      - "src/**"
      - "test/**"
      - "tsconfig.json"
  push:
    branches-ignore:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "package.json"
      - "package-lock.json"
      - "prisma/**"
      - "prisma.config.ts"
      - "src/**"
      - "test/**"
      - "tsconfig.json"

permissions:
  contents: read

concurrency:
  group: meco-platform-ci
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/meco_platform?schema=public

jobs:
  validate:
    name: Test and validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Validate Prisma schema
        run: npx prisma validate
