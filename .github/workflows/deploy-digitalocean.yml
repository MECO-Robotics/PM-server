name: Deploy Server to DigitalOcean

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-digitalocean.yml"
      - ".do/app.yaml"
      - "src/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "prisma.config.ts"
      - "Dockerfile"

permissions:
  contents: read

concurrency:
  group: digitalocean-server-production
  cancel-in-progress: true

jobs:
  validate:
    name: Validate server build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/meco_platform?schema=public

  deploy:
    name: Deploy to DigitalOcean App Platform
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy app spec
        uses: digitalocean/app_action/deploy@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_spec_location: .do/app.yaml
          print_build_logs: true
          print_deploy_logs: true
